name: TaskManager CI Pipeline

on:
  push:
    branches:
      [main]
  pull_request:
    branches:
      [main]

# This job is commented out to demonstrate how to use a matrix strategy for running the build on multiple operating systems. 
# Uncomment and modify as needed.

