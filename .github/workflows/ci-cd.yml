name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '8.0.x'
  DOCKER_IMAGE: taskmanager-api

jobs:
  build:
    runs-on: {{matrix.os}}
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-output
        path: |
          **/bin/Release/
          **/obj/Release/

  docker-build:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      run: docker build -f TaskManager.Api/Dockerfile -t ${{ env.DOCKER_IMAGE }}:${{ github.sha }} .

    - name: Test Docker image
      run: |
        docker run -d --name test-api \
          -e ASPNETCORE_ENVIRONMENT=Development \
          -e ConnectionStrings__DefaultConnection="Host=host.docker.internal;Port=5432;Database=taskmanager;Username=taskmanager;Password=taskmanager123" \
          -p 8080:8080 \
          ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
        sleep 5
        curl -f http://localhost:8080/swagger/v1/swagger.json || exit 1
        docker stop test-api